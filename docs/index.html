<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Jogador</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Fonte profissional e limpa -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Teko:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1E1E1E;
            --bg-card: #2A2A2A;
            --text-primary: #E0E0E0;
            --text-secondary: #B3B3B3;
            --accent-color: #BB86FC;
            --accent-color-secondary: #03DAC6;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .login-box {
            background-color: var(--bg-secondary);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h1 {
            font-family: 'Teko', sans-serif;
            font-size: 3em;
            margin: 0 0 10px 0;
            color: var(--accent-color);
            letter-spacing: 2px;
        }
        #reader { border: 2px dashed var(--accent-color); border-radius: 8px; overflow: hidden; }
        .manual-login { margin-top: 20px; }
        .manual-login input { padding: 12px; background: var(--bg-primary); border: 1px solid #444; color: var(--text-primary); border-radius: 4px; width: 60%;}
        .manual-login button { padding: 12px 20px; background: var(--accent-color); border: none; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* --- DASHBOARD DO PERFIL --- */
        #perfil-jogador {
            display: none;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 100vh;
            width: 100vw;
            height: 100vh;
        }

        /* BARRA LATERAL */
        .sidebar {
            background-color: var(--bg-secondary);
            padding: 25px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }
        .profile-header { text-align: center; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent-color); object-fit: cover; margin-bottom: 15px; }
        #p-nome { font-family: 'Teko'; font-size: 2.5em; margin: 0; }
        #p-titulo { color: var(--text-secondary); margin: 0 0 20px 0; font-style: italic; }

        .sidebar-stats {
            margin-top: auto; /* Empurra para baixo */
        }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .stat-line strong { color: var(--accent-color-secondary); }

        .xp-bar-container { background: #444; border-radius: 5px; height: 10px; margin-top: 5px;}
        #p-xp-bar { background: linear-gradient(90deg, var(--accent-color), var(--accent-color-secondary)); height: 100%; width: 0%; border-radius: 5px; }

        /* ÁREA DE CONTEÚDO PRINCIPAL */
        .main-content {
            padding: 30px;
            overflow-y: auto;
        }
        .content-card {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .content-card h2 { border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-bottom: 15px; font-family: 'Teko'; letter-spacing: 1px; }

        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 15px; }
        .icon-item { text-align: center; }
        .icon-item img { width: 60px; height: 60px; border-radius: 8px; background-color: var(--bg-secondary); }
        .icon-item span { font-size: 0.8em; color: var(--text-secondary); display: block; margin-top: 5px; }

        .list-display { display: flex; flex-direction: column; gap: 10px; }
        .list-item { background: var(--bg-secondary); padding: 12px; border-radius: 4px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--accent-color-secondary); }
    
        /* --- BARRA DE XP ESTILO WARCRAFT --- */
        .wow-xp-container {
            width: 100%;
            height: 18px;
            background-color: #080808; /* Fundo quase preto */
            border: 2px solid #3a3a3a; /* Borda cinza metálica */
            border-radius: 2px;
            position: relative;
            box-shadow: inset 0 0 6px #000, 0 0 0 1px #111; /* Profundidade */
            overflow: hidden;
            margin-top: 10px;
        }

        .wow-xp-fill {
            height: 100%;
            width: 0%;
            /* O clássico roxo de "Rested XP" do WoW. Se quiser dourado, avisa! */
            background: linear-gradient(to bottom, #a350f5 0%, #5d1c9e 50%, #3a0d6b 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3); /* Brilhozinho no topo */
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .wow-xp-segments {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* O truque mestre: desenha uma linha preta a cada 10% pra fazer os "quadradinhos" */
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent calc(10% - 2px),
                #222 calc(10% - 2px),
                #222 10%
            );
            pointer-events: none;
        }

        .wow-xp-text {
            text-align: center;
            font-size: 0.9em;
            font-weight: bold;
            color: #d4d0c8;
            margin-top: 4px;
            text-shadow: 1px 1px 2px #000;
            font-family: 'Ubuntu Mono', monospace;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>PERFIL DE JOGADOR</h1>
            <p>Aproxime o Cartão QR ou digite seu ID.</p>
            <div id="reader"></div>
            <div class="manual-login">
                <input type="text" id="input-manual-id" placeholder="ID do Personagem">
                <button onclick="loginManual()">Acessar</button>
            </div>
        </div>
    </div>

    <div id="perfil-jogador">
        <!-- BARRA LATERAL COM INFOS PRINCIPAIS -->
        <aside class="sidebar">
            <div class="profile-header">
                <img src="https://via.placeholder.com/120" id="p-avatar" class="avatar" alt="Avatar">
                <h1 id="p-nome">Nome do Jogador</h1>
                <p id="p-titulo">Título do Jogador</p>
            </div>

            <!-- Stats Financeiros -->
            <div class="stat-line"><span>Moedas:</span> <strong id="p-moedas">0</strong></div>
            <div class="stat-line"><span>Tickets:</span> <strong id="p-tickets">0</strong></div>
            <hr style="border-color: #333; margin: 15px 0;">

            <!-- Nível e XP (Estilo WoW) -->
            <div class="stat-line" style="margin-bottom: 2px;">
                <span style="font-weight: bold; color: #fff; font-size: 1.1em;">Nível <strong id="p-nivel" style="color: #ffb703; font-size: 1.3em;">1</strong></span>
            </div>
            
            <div class="wow-xp-container">
                <div id="p-xp-bar" class="wow-xp-fill"></div>
                <div class="wow-xp-segments"></div>
            </div>
            <div class="wow-xp-text" id="p-xp-texto">0 / 10</div>
            
            <div class="sidebar-stats">
                 <hr style="border-color: #333; margin: 15px 0;">
                <div class="stat-line"><span>ELO:</span> <strong id="p-elo">1000</strong></div>
                <button onclick="location.reload()" style="width: 100%; padding: 10px; margin-top: 20px; background: #333; border: 1px solid #555; color: white; cursor: pointer;">Sair</button>
            </div>
        </aside>

        <!-- CONTEÚDO DETALHADO -->
        <main class="main-content">
            <div class="content-card">
                <h2>Insígnias</h2>
                <div class="grid-display" id="lista-insignias"><p>Nenhuma insígnia obtida.</p></div>
            </div>
            <div class="content-card">
                <h2>Conquistas</h2>
                <div class="list-display" id="lista-conquistas"><p>Nenhuma conquista desbloqueada.</p></div>
            </div>
            <div class="content-card">
                <h2>Inventário</h2>
                <div class="list-display" id="lista-inventario"><p>Inventário vazio.</p></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
