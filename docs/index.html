<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório do Jogador</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1f1a1a 0%, #000 100%); color: #eee; font-family: 'Ubuntu Mono', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        h1, h2, h3, h4 { font-family: 'MedievalSharp', cursive; margin-top: 0; }
        
        #login-screen { text-align: center; background: rgba(20, 15, 25, 0.9); padding: 30px; border: 2px solid #5a189a; border-radius: 15px; box-shadow: 0 0 30px rgba(90, 24, 154, 0.5); width: 100%; max-width: 400px; height: fit-content; margin-top: 10vh;}
        .manual-login input { padding: 10px; width: 60%; background: #000; color: #e0aaff; border: 1px solid #5a189a; outline: none; }
        .manual-login button { padding: 10px; background: #5a189a; color: #fff; border: none; cursor: pointer; font-family: 'MedievalSharp'; }

        /* A FICHA DO PERSONAGEM */
        #perfil-jogador {
            display: none; background-color: #e8d8b7; color: #3e2723; padding: 30px; 
            width: 100%; max-width: 700px; box-shadow: 10px 10px 30px rgba(0,0,0,0.9); border-radius: 5px;
        }
        .scroll-header { text-align: center; border-bottom: 2px solid #8b4513; margin-bottom: 20px; padding-bottom: 10px;}
        #p-nome { font-size: 2.5em; margin: 0; letter-spacing: 1px; }
        
        /* Barra de XP */
        .xp-container { background: #3e1004; border: 2px solid #220802; border-radius: 10px; height: 25px; width: 100%; margin: 15px 0; position: relative; overflow: hidden; }
        .xp-bar { background: linear-gradient(90deg, #fca311, #ffb703); height: 100%; width: 0%; transition: width 0.5s ease-in-out; }
        .xp-text { position: absolute; width: 100%; text-align: center; top: 3px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; font-size: 0.9em; }

        /* Grid de Status */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-bottom: 20px;}
        .stat-box { background: rgba(139,69,19,0.1); padding: 10px; border: 1px solid #8b4513; border-radius: 5px; font-weight: bold; }
        .stat-box span { display: block; font-size: 1.2em; color: #8b0000; }

        /* Seções da Ficha */
        .secao { border: 2px groove #8b4513; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.2); }
        .secao h3 { border-bottom: 1px dashed #8b4513; padding-bottom: 5px; color: #5c1605; }
        
        /* Itens Visuais */
        .icon-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .item-icon { width: 50px; height: 50px; border: 1px solid #555; background: #ccc; border-radius: 5px; object-fit: cover; }
        .item-card { background: rgba(0,0,0,0.05); padding: 5px 10px; border: 1px solid #8b4513; border-radius: 3px; font-size: 0.9em; display: flex; align-items: center; gap: 10px;}
        
        .logout-btn { width: 100%; padding: 15px; background: #5c1605; color: #e8d8b7; font-family: 'MedievalSharp'; font-size: 1.2em; cursor: pointer; border: 2px solid #3e1004;}
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Acesso ao Grimório</h1>
        <div id="reader" style="background:#000;"></div>
        <div class="manual-login">
            <input type="text" id="input-manual-id" placeholder="ID (Nome Verdadeiro)">
            <button onclick="loginManual()">Invocar</button>
        </div>
    </div>

    <div id="perfil-jogador">
        <div class="scroll-header">
            <h1 id="p-nome">Nome</h1>
            <h3 id="p-titulo">Título</h3>
            
            <div class="xp-container">
                <div class="xp-bar" id="p-xp-bar"></div>
                <div class="xp-text">Nível <span id="p-nivel">1</span> - <span id="p-xp-texto">0 / 500 XP</span></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">Moedas <span id="p-moedas">0</span></div>
            <div class="stat-box">Tickets <span id="p-tickets">0</span></div>
            <div class="stat-box">ELO <span id="p-elo">1000</span></div>
            <div class="stat-box" style="font-size: 0.8em; align-items: center; display:flex; justify-content:center;">Status<br>Normal</div>
        </div>

        <div class="secao">
            <h3>🛡️ Insígnias</h3>
            <div class="icon-grid" id="lista-insignias">Nenhuma insígnia obtida... fraco.</div>
        </div>

        <div class="secao">
            <h3>🏆 Conquistas</h3>
            <div id="lista-conquistas" style="display: flex; flex-direction: column; gap: 8px;">Ainda não fez porra nenhuma de útil.</div>
        </div>

        <div class="secao">
            <h3>🃏 Inventário TCG</h3>
            <div class="icon-grid" id="lista-tcg">Nenhuma carta na manga.</div>
        </div>

        <div class="secao">
            <h3>🧩 Fragmentos & Colecionáveis</h3>
            <div id="lista-colecionaveis" style="display: flex; flex-direction: column; gap: 5px;">Inventário vazio.</div>
        </div>

        <button class="logout-btn" onclick="location.reload()">Enrolar Pergaminho</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
